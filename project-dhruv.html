  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      background: #020617;
      color: #fff;
    }
    body::before, body::after {
      content: "";
      position: fixed;
      width: 50vw; height: 50vw;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.1;
      pointer-events: none;
    }
    body::before { top:-10%;left:-10%;background:#0055FF;animation:blobFloat 20s infinite alternate; }
    body::after  { bottom:-10%;right:-10%;background:#4f46e5;animation:blobFloat 25s infinite alternate-reverse; }
    @keyframes blobFloat {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(10%,10%) scale(1.1); }
    }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .glass-light {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    /* Fade-in animations */
    .fade-enter { opacity:0; transform: translateY(24px); }
    .fade-enter-active { opacity:1; transform:translateY(0); transition: opacity 0.9s cubic-bezier(.16,1,.3,1), transform 0.9s cubic-bezier(.16,1,.3,1); }
    .fade-from-left { opacity:0; transform: translateX(-30px); }
    .fade-from-left.visible { opacity:1; transform:translateX(0); transition: opacity 0.8s ease, transform 0.8s ease; }
    .fade-up { opacity:0; transform: translateY(24px); }
    .fade-up.visible { opacity:1; transform:translateY(0); transition: opacity 0.8s cubic-bezier(.16,1,.3,1), transform 0.8s cubic-bezier(.16,1,.3,1); }
    .fade-scale { opacity:0; transform: scale(0.88); }
    .fade-scale.visible { opacity:1; transform:scale(1); transition: opacity 0.9s ease, transform 0.9s ease; }
    /* Hover effects */
    .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .card-hover:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.15); }

    /* Accordion */

    /* Stagger children */
    .stagger > *:nth-child(1) { transition-delay: 0s; }
    .stagger > *:nth-child(2) { transition-delay: 0.1s; }
    .stagger > *:nth-child(3) { transition-delay: 0.2s; }
    .stagger > *:nth-child(4) { transition-delay: 0.3s; }
    .stagger > *:nth-child(5) { transition-delay: 0.4s; }
    .stagger > *:nth-child(6) { transition-delay: 0.5s; }
    .stagger > *:nth-child(7) { transition-delay: 0.6s; }

/* ─── Logo ─────────────────────────────────────────────────── */
function Logo() {
  const colors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6'];
  return (
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" className="w-full h-full drop-shadow-sm"
      style={{ animation: 'spin 30s linear infinite' }}>

      <circle cx="50" cy="50" r="6" fill="white" fillOpacity="0.2" />
    </svg>
  );
}

/* ─── Hooks ─────────────────────────────────────────────────── */
function useVisible(margin = '-150px') {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) setVisible(true); },
      { rootMargin: margin }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function useScrollY() {
  const [y, setY] = useState(0);
  useEffect(() => {
    const h = () => setY(window.scrollY);
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);
  return y;
}

/* ─── Counter ───────────────────────────────────────────────── */
function Counter({ target, duration = 2000, delay = 0 }) {
  const [count, setCount] = useState(0);
  const [ref, visible] = useVisible('-100px');
  const started = useRef(false);
  useEffect(() => {
    if (visible && !started.current) {
      started.current = true;
      const tid = setTimeout(() => {
        let start = null;
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 5);
          setCount(Math.floor(ease * target));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, delay * 1000);
      return () => clearTimeout(tid);
    }
  }, [visible, target, duration, delay]);
  return <span ref={ref} className="tabular-nums">{count.toLocaleString()}</span>;
}

/* ─── FadeSection ───────────────────────────────────────────── */
function FadeSection({ children, className, id, style, direction = 'up', delay = '0s' }) {
  const [ref, visible] = useVisible('-120px');
  const dirs = {
    up: ['translateY(24px)', 'translateY(0)'],
    down: ['translateY(-24px)', 'translateY(0)'],
    left: ['translateX(-30px)', 'translateX(0)'],
    right: ['translateX(30px)', 'translateX(0)'],
    scale: ['scale(0.9)', 'scale(1)'],
  };
  const [from, to] = dirs[direction] || dirs.up;
  return (
    <section ref={ref} id={id} className={className} style={{
      ...style,
      opacity: visible ? 1 : 0,
      transform: visible ? to : from,
      transition: `opacity 0.9s cubic-bezier(.16,1,.3,1) ${delay}, transform 0.9s cubic-bezier(.16,1,.3,1) ${delay}`,
      willChange: 'transform, opacity',
    }}>
      {children}
    </section>
  );
}

      backgroundColor: scrolled ? 'rgba(0,0,0,0.85)' : 'transparent',

      borderBottom: scrolled ? '1px solid rgba(255,255,255,0.1)' : 'none',
      transition: 'all 0.5s ease',
      padding: scrolled ? '12px 0' : '24px 0',
      opacity: mounted ? 1 : 0,
      transform: mounted ? 'translateY(0)' : 'translateY(-50px)',
    }}>
      <div className="container mx-auto px-6 flex items-center justify-between">
        <a href="#home" className="flex items-center gap-3 group flex-shrink-0" onClick={() => setOpen(false)}>
          <div className="w-10 h-10 rounded-xl overflow-hidden p-1.5" style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}}>

          </div>
          <span className="text-xl font-bold tracking-tighter text-white">
            PROJECT <span style={{color:'#EFAE3C'}}>DHRUV</span>
          </span>
        </a>

        {/* Desktop */}
        <div className="hidden xl:flex items-center gap-1 rounded-2xl p-1" style={{background: scrolled ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.1)'}}>

            <a key={l.href} href={l.href} className="nav-link relative px-4 py-2 rounded-xl text-[10px] font-bold tracking-[0.2em] text-white/70 hover:text-primary transition-colors">
              {l.name}

          ))}
          <div className="ml-2">
            <a href="#donate">

                onMouseEnter={e => e.currentTarget.style.background='#000'}
                onMouseLeave={e => e.currentTarget.style.background='#0055FF'}>
                DONATE

          <Icon name={open ? 'X' : 'Menu'} size={24} />
        </button>
      </div>

      {/* Mobile menu */}
      <div style={{
        maxHeight: open ? '600px' : '0',
        overflow: 'hidden',
        opacity: open ? 1 : 0,
        transition: 'max-height 0.6s cubic-bezier(.16,1,.3,1), opacity 0.4s ease',
        background: 'rgba(0,0,0,0.95)',
        backdropFilter: 'blur(20px)',
        borderBottom: open ? '1px solid rgba(255,255,255,0.1)' : 'none',
      }}>
        <div className="container mx-auto px-6 py-10 flex flex-col gap-6">
          {navLinks.map((l, i) => (
            <a key={l.href} href={l.href} onClick={() => setOpen(false)}
              className="text-sm font-bold tracking-[0.3em] text-white/70 hover:text-primary transition-colors"
              style={{ transitionDelay: `${i * 50}ms` }}>
              {l.name}
            </a>
          ))}
          <a href="#donate" onClick={() => setOpen(false)} className="mt-4">
            <button className="w-full py-5 text-white rounded-2xl font-bold tracking-widest shadow-xl"
              style={{background:'#0055FF'}}

              DONATE NOW

                    onFocus={e=>e.currentTarget.style.borderColor='rgba(0,85,255,0.5)'}
                    onBlur={e=>e.currentTarget.style.borderColor='rgba(26,26,26,0.1)'} />
                </div>
                <button className="w-full py-5 text-white rounded-xl font-bold transition-all shadow-xl btn-hover"
                  style={{ background:'#0055FF',boxShadow:'0 20px 40px rgba(0,85,255,0.2)' }}
                  onMouseEnter={e=>e.currentTarget.style.background='#000'} onMouseLeave={e=>e.currentTarget.style.background='#0055FF'}>
                  Send Message
                </button>
              </div>
            </div>
          </div>
        </div>
      </FadeSection>

      {/* Map */}
      <FadeSection className="pt-32 pb-24" style={{ background:'#f0f9ff' }}>
        <div className="container mx-auto px-6">
          <div className="relative w-full overflow-hidden glass-light rounded-[3rem] shadow-2xl" style={{ height:'450px',border:'1px solid rgba(26,26,26,0.1)' }}>
            <iframe
              src="https://maps.google.com/maps?q=D-173,%20Sushant%20Lok%201,%20Gurugram,%20Haryana%20122002&t=&z=15&ie=UTF8&iwloc=&output=embed"
              width="100%" height="100%" style={{ border:0 }} allowFullScreen loading="lazy"
              referrerPolicy="no-referrer-when-downgrade" title="Project Dhruv Location" />
          </div>
        </div>
      </FadeSection>
    </div>
  );
}
